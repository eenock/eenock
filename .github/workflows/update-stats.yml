# .github/workflows/update-stats.yml
name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch top-langs SVG
        run: |
          mkdir -p assets
          urls=(
            "https://github-readme-stats.vercel.app/api/top-langs/?username=eenock&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"
            "https://github-readme-stats-eight-theta.vercel.app/api/top-langs/?username=eenock&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"
          )
          for url in "${urls[@]}"; do
            echo "Trying: $url"
            if curl -fsSL "$url" -o assets/top-langs.svg && [ "$(wc -c < assets/top-langs.svg)" -ge 500 ]; then
              echo "Success: $url"
              exit 0
            fi
          done
          echo "::error::All top-langs sources failed"
          exit 1

      - name: Fetch trophies SVG
        run: |
          mkdir -p assets
          urls=(
            "https://github-profile-trophy.vercel.app/?username=eenock&theme=tokyonight&no-frame=true&row=1&column=7"
            "https://github-profile-trophy-liard-delta.vercel.app/?username=eenock&theme=tokyonight&no-frame=true&row=1&column=7"
            "https://github-profile-trophy-fork-two.vercel.app/?username=eenock&theme=tokyonight&no-frame=true&row=1&column=7"
            "https://github-profile-trophy-winning.vercel.app/?username=eenock&theme=tokyonight&no-frame=true&row=1&column=7"
          )
          for url in "${urls[@]}"; do
            echo "Trying: $url"
            if curl -fsSL "$url" -o assets/trophies.svg && [ "$(wc -c < assets/trophies.svg)" -ge 500 ]; then
              echo "Success: $url"
              exit 0
            fi
          done
          echo "::error::All trophy sources failed"
          exit 1

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
