name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch top-langs SVG
        run: |
          mkdir -p assets
          urls=(
            "https://vercel.app"
            "https://vercel.app"
          )
          for url in "${urls[@]}"; do
            echo "Trying: $url"
            if curl -fsSL "$url" -o assets/top-langs.svg && [ "$(wc -c < assets/top-langs.svg)" -ge 500 ]; then
              echo "Success: $url"
              break
            fi
          done

      # REPLACED CURL ARRAY WITH NATIVE GITHUB ACTION TO BYPASS RATE LIMITS
      - name: Fetch trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: eenock
          # Custom arguments parsed directly from your URL string
          theme: tokyonight
          column: 7
          row: 1
          no-frame: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The action naturally saves to the root directory. We move it into assets/ for consistency.
      - name: Move Trophy file
        run: |
          mkdir -p assets
          if [ -f "trophy.svg" ]; then
            mv trophy.svg assets/trophies.svg
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
