name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch top-langs SVG
        run: |
          mkdir -p assets
          urls=(
            "https://vercel.app"
            "https://vercel.app"
          )
          for url in "${urls[@]}"; do
            echo "Trying: $url"
            if curl -fsSL "$url" -o assets/top-langs.svg && [ "$(wc -c < assets/top-langs.svg)" -ge 500 ]; then
              echo "Success: $url"
              break
            fi
          done

      # Clean any workspace residual directories before execution
      - name: Pre-clean workspace
        run: rm -rf trophy.svg trophies.svg assets/trophies.svg

      - name: Fetch trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: eenock
          theme: tokyonight
          token: ${{ secrets.GITHUB_TOKEN }}
          output_path: assets/trophies.svg # FORCES THE ENGINE TO WRITE TO A FILE PATH, SOLVING THE DENO BUG

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add assets/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
