name: Update Profile Stats
on:
  schedule:
    - cron: '0 0 * * *'   # daily
  workflow_dispatch:
jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch top-langs SVG
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=eenock&layout=compact&theme=tokyonight&langs_count=8
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Clean any workspace residual directories before execution
      - name: Pre-clean workspace
        run: rm -rf trophy.svg trophies.svg assets/trophies.svg

      - name: Fetch trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: eenock
          theme: tokyonight
          token: ${{ secrets.GITHUB_TOKEN }}
          output_path: assets/trophies.svg

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
